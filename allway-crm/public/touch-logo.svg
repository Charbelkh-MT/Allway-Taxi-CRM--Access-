<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 100">
  <!-- Touch Lebanon — turquoise overlapping ellipses (touch fingerprint mark) -->
  <ellipse cx="55" cy="42" rx="42" ry="32" fill="#009FB4" opacity="0.85"/>
  <ellipse cx="85" cy="42" rx="42" ry="32" fill="#009FB4"/>
  <!-- Wordmark -->
  <text x="135" y="55" 
    font-family="'Arial Rounded MT Bold','Arial Black',Arial,sans-serif"
    font-size="42" font-weight="900" fill="#009FB4" letter-spacing="-1">touch</text>
</svg>
