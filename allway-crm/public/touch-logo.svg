<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120" fill="none">
  <!-- Touch Lebanon brand: teal/blue #0074BD with clean modern wordmark -->
  <!-- Gradient background bar -->
  <defs>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#005EAC"/>
      <stop offset="100%" style="stop-color:#00A0D6"/>
    </linearGradient>
  </defs>
  <!-- Wave arc shape (their brand element) -->
  <path d="M 20 90 C 60 30, 120 30, 160 70 C 180 90, 200 100, 240 75" 
        stroke="url(#tg)" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- Wordmark -->
  <text x="18" y="108" font-family="'Arial Black', Arial, sans-serif" 
        font-size="52" font-weight="900" fill="#005EAC" letter-spacing="-1">touch</text>
</svg>
